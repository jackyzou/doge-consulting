name: CI/CD — Test & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel any in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx vitest run

      - name: Build check
        run: npm run build
        env:
          DOCKER_BUILD: "1"

  # Deploy is handled by the target PC's auto-deploy listener (scripts/auto-deploy.ps1)
  # which polls GitHub for successful CI runs and deploys automatically.
  # No self-hosted runner needed — the listener runs independently on the target machine.
